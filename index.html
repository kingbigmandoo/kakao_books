<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
</head>
<body>
    <header class="main-header">
    <div class="top-row">
        <div class="logo">
            <img src="image/로고1.png" alt="SY 문고 로고">
        </div>
        <div class="search-bar">
            <input type="text" id="searchKeyword" placeholder="검색어를 입력하세요">
        <img src="image/돋보기.png" alt="검색" class="search-icon" id="searchBtn">
        </div>
        <div class="cart-icon">🛒</div>
    </div>
    </header>

    <nav class="menu-nav">
        <ul class="menu-container">
        <li>상반기결산</li>
            <li>레노바포켓몬</li>
            <li>베스트</li>
            <li>이벤트</li>
            <li>주말특가</li>
            <li>바로펀딩</li>
            <li>신상품</li>
            <li>PICKS</li>
            <li>컬처라운지</li>
        </ul>
    </nav>
    
    <div class="banner-container" id="bannerContainer">
    <div class="swiper mySwiper">
     <div class="swiper-wrapper">
      
      <div class="swiper-slide" data-bg-color="#ffa500">
        <div class="slide-content">
          <div class="image-area">
            <img src="./image/스페셜.jpg" alt="책 표지 1" class="book-img">
          </div>
        </div>
      </div>

      <div class="swiper-slide" data-bg-color="#0f8a5f">
        <div class="slide-content">
          <div class="image-area">
            <img src="./image/발견의기쁨.png" alt="책 표지 2" class="book2-img">
          </div>
        </div>
      </div>
    </div>

    <div class="controls-wrapper">
      <button type="button" class="btn-toggle-play" aria-label="일시정지">
        <span class="icon">||</span>
      </button>
      <div class="custom-pagination"></div>
      <button type="button" class="btn-all-view">전체보기</button>
    </div>

  </div>
    </div>
        <section class="icon-menu">
            <div class="menu-item"><img src="image/나누기.svg"><span>오늘의특가</span></div>
            <div class="menu-item"><img src="image/다트.svg"><span>오늘의미션</span></div>
            <div class="menu-item"><img src="image/집.svg"><span>매장</span></div>
            <div class="menu-item"><img src="image/돈.svg"><span>바로펀딩</span></div>
        </section>

    <div class="ad-container">
        <div class="ad-box">
            <img src="image/사랑.png" alt="광고1">
            <div class="ad-text">
            </div>
        </div>
        
        <div class="ad-box">
            <img src="image/이순신.jpg" alt="광고2">
            <div class="ad-text">
            </div>
        </div>
    </div>
        
        <section class="book-list-section">
            <h2>오늘의 선택</h2>
            <div class="grid-container" id="bookList">
                </div>
        </section>
        
        <section class="md-recommend-section">
            <h2>MD들이 신중하게 골랐어요</h2>
            <div class="grid-container" id="mdList"></div>
        </section>
      

    <footer class="main-footer">푸터 영역</footer>
  
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="./swipper.js" defer></script>
  <script src="./main.js" defer></script>

</body>
</html>
